name: Grevm Tests

on:
  pull_request:
    branches: [ "main" ]
  merge_group:
    types: [checks_requested]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      # check out (with the `test_data` submodule, which the mainnet replay test reads)
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      # install rust tools
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # GREVM_MIN_PARALLEL_TXS=0 forces the parallel path for the (often small) replayed mainnet
      # blocks so the parallel-vs-sequential comparison is actually exercised.
      - name: Run tests
        env:
          GREVM_MIN_PARALLEL_TXS: "0"
        run: cargo test --features test-utils
